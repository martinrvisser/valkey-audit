# valkey-audit module configuration
#
# To use this file, add the following line to your valkey.conf:
#   include /etc/valkey/valkey.conf.d/valkey-audit.conf
#
# Or load the module directly in valkey.conf:
#   loadmodule /usr/lib/valkey/modules/libvalkeyaudit.so

# Load the audit module
# loadmodule /usr/lib/valkey/modules/libvalkeyaudit.so

# Enable or disable audit logging (yes/no)
# audit.enabled yes

# Output protocol: file, syslog, or tcp
# audit.protocol file

# Log format: text, json, or csv
# audit.format text

# Event categories to audit (comma-separated):
# connections, auth, config, keys, other, all
# audit.events all

# Disable logging of command payloads (yes/no)
# audit.payload_disable no

# Maximum payload size in bytes (0 = unlimited)
# audit.payload_maxsize 0

# Exclusion rules for users/IPs (semicolon-separated):
# Format: user:USERNAME, ip:ADDRESS, or userip:USERNAME@ADDRESS
# audit.excluderules ""

# Exclude specific commands (comma-separated)
# audit.exclude_commands ""

# Prefix-based command filter (comma-separated)
# audit.prefix_filter ""

# Custom command categories (comma-separated CATEGORY:CMD pairs)
# audit.custom_category ""

# Always audit CONFIG commands even if excluded (yes/no)
# audit.always_audit_config no

# Ignore internal/replica clients (yes/no)
# audit.ignore_internal_clients no

# TCP output settings (when audit.protocol is tcp)
# audit.tcp_host ""
# audit.tcp_port 0
# audit.tcp_timeout_ms 5000
# audit.tcp_retry_interval_ms 5000
# audit.tcp_max_retries 3
# audit.tcp_reconnect_on_failure yes
# audit.tcp_buffer_on_disconnect yes

# Delay in ms before checking auth result
# audit.auth_result_check_delay_ms 0
